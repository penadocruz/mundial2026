<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundial 2026 🏆</title>

  <style>
    :root {
      --green:   #1a7a3c;
      --green2:  #1e8f45;
      --line:    rgba(255,255,255,0.18);
      --white:   #ffffff;
      --card:    rgba(255,255,255,0.93);
      --card-border: rgba(255,255,255,0.6);
      --yellow:  #f5c518;
      --blue:    #1a5bbf;
      --red:     #d42b2b;
      --text:    #111;
      --muted:   #555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--green);
      min-height: 100vh;
      padding-bottom: 4rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Campo de fútbol como fondo ─────────────────────────────────────── */
    .field-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .field-bg svg { width: 100%; height: 100%; }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 1rem; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 2.8rem 0 1.8rem;
    }
    .header-badge {
      display: inline-block;
      background: var(--yellow);
      color: #111;
      font-family: Impact, 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 800;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 99px;
      margin-bottom: 0.8rem;
    }
    header h1 {
      font-family: Impact, 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 800;
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      color: var(--white);
      line-height: 0.95;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    header p {
      color: rgba(255,255,255,0.75);
      font-size: 0.82rem;
      margin-top: 0.6rem;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    /* ── Filtros ─────────────────────────────────────────────────────────── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
      margin: 0 0 2rem;
    }
    .search-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .search-wrap input {
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(255,255,255,0.5);
      color: var(--text);
      padding: 0.55rem 1.1rem;
      border-radius: 99px;
      font-size: 0.85rem;
      font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      outline: none;
      width: 260px;
      transition: border 0.2s, box-shadow 0.2s;
    }
    .search-wrap input:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 3px rgba(245,197,24,0.3);
    }
    .search-wrap input::placeholder { color: #888; }

    .filter-btn {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.35);
      color: rgba(255,255,255,0.85);
      padding: 0.4rem 0.9rem;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: Impact, 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.18s;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }
    .filter-btn.active {
      background: var(--yellow);
      border-color: var(--yellow);
      color: #111;
    }

    /* ── Grupos de día ───────────────────────────────────────────────────── */
    .day-group { margin-bottom: 2rem; }
    .day-label {
      font-family: Impact, 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      padding: 0 0.2rem 0.5rem;
      border-bottom: 1.5px solid rgba(255,255,255,0.2);
      margin-bottom: 0.7rem;
    }

    /* ── Tarjeta de partido ──────────────────────────────────────────────── */
    .match {
      background: var(--card);
      border: 1.5px solid var(--card-border);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(6px);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .match:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }
    .match.hl {
      border-left: 4px solid var(--yellow);
      background: rgba(255,255,255,0.97);
    }

    .team { font-size: 0.88rem; color: var(--text); font-weight: 600; line-height: 1.3; }
    .team.right { text-align: right; }
    .flag { font-size: 1.3rem; display: block; line-height: 1; margin-bottom: 0.15rem; }
    .flag.right { text-align: right; }

    /* Centro */
    .match-center { text-align: center; }
    .phase-tag {
      display: inline-block;
      font-family: Impact, 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
      margin-bottom: 0.25rem;
    }
    .tg  { background:#e8f5ee; color:#1a7a3c; border:1px solid #b2dcc3; }
    .t16 { background:#e8eef8; color:#1a5bbf; border:1px solid #b2c5e8; }
    .t8  { background:#f3e8f8; color:#7a1abf; border:1px solid #d4b2e8; }
    .tqf { background:#fff0e8; color:#bf5a1a; border:1px solid #e8c9b2; }
    .tsf { background:#fffbe8; color:#a07a00; border:1px solid #e8d88a; }
    .t3  { background:#e8f8f8; color:#1a8a8a; border:1px solid #b2dede; }
    .tf  { background:#fffae0; color:#8a6000; border:1px solid var(--yellow); font-size:0.65rem; }

    .match-time {
      font-family: Impact, 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--green);
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .match-meta {
      font-size: 0.63rem;
      color: var(--muted);
      margin-top: 0.2rem;
      line-height: 1.4;
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 0.7rem;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.15);
    }

    @media(max-width:480px){
      .match { gap: 0.3rem; padding: 0.7rem 0.75rem; }
      .team { font-size: 0.78rem; }
      .flag { font-size: 1.1rem; }
      .match-time { font-size: 1.1rem; }
      header h1 { font-size: 2.5rem; }
    }
  </style>
</head>

const DAYS   = ["dom","lun","mar","mié","jue","vie","sáb"];
const MONTHS = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function fmtDate(d) {
  const [y,m,day] = d.split("-").map(Number);
  const dt = new Date(y, m-1, day);
  return `${DAYS[dt.getDay()]} ${day} ${MONTHS[m-1]} ${y}`;
}

const TAG = {
  "Grupos":   ["tg",  "Grupo"],
  "16vos":    ["t16", "16vos"],
  "Octavos":  ["t8",  "Octavos"],
  "Cuartos":  ["tqf", "Cuartos"],
  "Semis":    ["tsf", "Semis"],
  "3er lugar":["t3",  "3er Lugar"],
  "Final":    ["tf",  "⭐ Final"],
};

let activePhase = "all";

function setPhase(p, btn) {
  activePhase = p;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const filtered = matches.filter(m => {
    const phaseOk = activePhase === "all" || m.p === activePhase;
    const dateStr = fmtDate(m.date).toLowerCase(); // ej: "jue 11 jun 2026"
    const dayNum  = m.date.split("-")[2];           // ej: "11"
    const searchOk = !q
      || m.home.toLowerCase().includes(q)
      || m.away.toLowerCase().includes(q)
      || m.venue.toLowerCase().includes(q)
      || dateStr.includes(q)
      || dayNum.includes(q);
    return phaseOk && searchOk;
  });

  const byDate = {};
  filtered.forEach(m => { (byDate[m.date] = byDate[m.date] || []).push(m); });
  const dates = Object.keys(byDate).sort();

  const el = document.getElementById("schedule");
  if (!dates.length) {
    el.innerHTML = `<p style="text-align:center;color:rgba(255,255,255,0.6);margin-top:3rem;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;">Sin resultados 🤷</p>`;
    return;
  }

  el.innerHTML = dates.map(date => {
    const cards = byDate[date].map(m => {
      const [cls, lbl] = TAG[m.p] || ["tg",""];
      const grp = m.g ? ` · Grupo ${m.g}` : "";
      return `<div class="match${m.hl?" hl":""}">
        <div class="team"><span class="flag">${flag(m.home)}</span>${m.home}</div>
        <div class="match-center">
          <span class="phase-tag ${cls}">${lbl}${grp}</span>
          <div class="match-time">⏰ ${m.sv}</div>
          <div class="match-meta">🏟 ${m.venue}</div>
        </div>
        <div class="team right"><span class="flag right">${flag(m.away)}</span>${m.away}</div>
      </div>`;
    }).join("");
    return `<div class="day-group"><div class="day-label">📅 ${fmtDate(date)}</div>${cards}</div>`;
  }).join("");
}

render();
</script>
